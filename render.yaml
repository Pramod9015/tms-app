# render.yaml — Infrastructure-as-code for Render.com
# Deploy this entire file via: https://dashboard.render.com/blueprints

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: tms-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free                      # Free tier (spins down after 15 min inactivity)
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tms-db
          property: connectionString   # Auto-injects PostgreSQL URL

      - key: SECRET_KEY
        generateValue: true           # Render generates a secure random value

      - key: AES_ENCRYPTION_KEY
        generateValue: true           # Render generates a 32-byte key

      - key: ALLOWED_ORIGINS
        value: "https://tms-web.vercel.app,https://localhost:5173"  # Update after frontend deploy

      - key: ADMIN_USERNAME
        value: admin

      - key: ADMIN_PASSWORD
        value: Admin@123!             # ⚠️ Change this after first login!

      - key: ADMIN_EMAIL
        value: admin@tms.local

      - key: GEMINI_API_KEY
        value: ""                     # ← paste your key from aistudio.google.com

      - key: RATE_LIMIT_PER_MINUTE
        value: "120"

# ── Free PostgreSQL Database ─────────────────────────────────────────────────
databases:
  - name: tms-db
    plan: free                        # 1 GB storage, expires after 90 days on free tier
    databaseName: tms
    user: tms_user
